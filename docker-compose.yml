services:
  backend:
    build: .
    restart: unless-stopped
    command:
      - /bin/sh
      - -ec
      - |
        PRODUCT_KEY="${PRODUCT:-homeworld}"
        PRODUCT_ROOT="/data/$$PRODUCT_KEY"
        DB_PATH="$$PRODUCT_ROOT/won_server.db"
        KEYS_DIR="$$PRODUCT_ROOT/keys"
        LEGACY_DB="/data/won_server.db"
        LEGACY_KEYS="/data/keys"

        mkdir -p "$$PRODUCT_ROOT" "$$KEYS_DIR"
        if [ ! -f "$$DB_PATH" ]; then
          if [ "$$PRODUCT_KEY" = "homeworld" ] && [ -f "$$LEGACY_DB" ]; then
            cp "$$LEGACY_DB" "$$DB_PATH"
          elif [ -f /app/won_oss_server/won_server.db ]; then
            cp /app/won_oss_server/won_server.db "$$DB_PATH"
          fi
        fi
        for key_file in authserver_private.der authserver_public.der verifier_private.der verifier_public.der kver.kp; do
          if [ ! -f "$$KEYS_DIR/$$key_file" ]; then
            if [ "$$PRODUCT_KEY" = "homeworld" ] && [ -f "$$LEGACY_KEYS/$$key_file" ]; then
              cp "$$LEGACY_KEYS/$$key_file" "$$KEYS_DIR/$$key_file"
            elif [ -f "/app/won_oss_server/keys/$$key_file" ]; then
              cp "/app/won_oss_server/keys/$$key_file" "$$KEYS_DIR/$$key_file"
            fi
          fi
        done
        exec python /app/won_oss_server/won_server.py \
          --product "$$PRODUCT_KEY" \
          --host 0.0.0.0 \
          --port "${BACKEND_PORT:-9100}" \
          --db-path "$$DB_PATH" \
          --shared-secret "${BACKEND_SHARED_SECRET:?set BACKEND_SHARED_SECRET in .env}"
    volumes:
      - ./data:/data
    networks:
      - won-network

  gateway:
    build: .
    restart: unless-stopped
    command:
      - /bin/sh
      - -ec
      - |
        PRODUCT_KEY="${PRODUCT:-homeworld}"
        PRODUCT_ROOT="/data/$$PRODUCT_KEY"
        DB_PATH="$$PRODUCT_ROOT/won_server.db"
        KEYS_DIR="$$PRODUCT_ROOT/keys"
        LEGACY_DB="/data/won_server.db"
        LEGACY_KEYS="/data/keys"

        mkdir -p "$$PRODUCT_ROOT" "$$KEYS_DIR"
        if [ ! -f "$$DB_PATH" ] && [ "$$PRODUCT_KEY" = "homeworld" ] && [ -f "$$LEGACY_DB" ]; then
          cp "$$LEGACY_DB" "$$DB_PATH"
        fi
        for key_file in authserver_private.der authserver_public.der verifier_private.der verifier_public.der kver.kp; do
          if [ ! -f "$$KEYS_DIR/$$key_file" ]; then
            if [ "$$PRODUCT_KEY" = "homeworld" ] && [ -f "$$LEGACY_KEYS/$$key_file" ]; then
              cp "$$LEGACY_KEYS/$$key_file" "$$KEYS_DIR/$$key_file"
            elif [ -f "/app/won_oss_server/keys/$$key_file" ]; then
              cp "/app/won_oss_server/keys/$$key_file" "$$KEYS_DIR/$$key_file"
            fi
          fi
        done
        exec python /app/won_oss_server/titan_binary_gateway.py \
          --product "$$PRODUCT_KEY" \
          --host 0.0.0.0 \
          --port "${GATEWAY_PORT:-15101}" \
          --backend-host backend \
          --backend-port "${BACKEND_PORT:-9100}" \
          --backend-shared-secret "${BACKEND_SHARED_SECRET:?set BACKEND_SHARED_SECRET in .env}" \
          --backend-timeout "${BACKEND_RPC_TIMEOUT:-5}" \
          --public-host "${PUBLIC_HOST:?set PUBLIC_HOST to your VPS public IPv4 or DNS name}" \
          --routing-port "${ROUTING_PORT:-15100}" \
          --routing-max-port "${ROUTING_MAX_PORT:-15120}" \
          --firewall-port "${FIREWALL_PORT:-2021}" \
          --admin-host 0.0.0.0 \
          --admin-port "${ADMIN_PORT:-8080}" \
          --admin-token "${ADMIN_TOKEN:?set ADMIN_TOKEN in .env for the Docker-published dashboard}" \
          --stats-token "${STATS_TOKEN:-}" \
          --db-path "$$DB_PATH" \
          --keys-dir "$$KEYS_DIR" \
          --log "${LOG_LEVEL:-INFO}"
    depends_on:
      - backend
    ports:
      - "${PORT_BIND_IP:-0.0.0.0}:${GATEWAY_PORT:-15101}:${GATEWAY_PORT:-15101}"
      - "${PORT_BIND_IP:-0.0.0.0}:${ROUTING_PORT:-15100}-${ROUTING_MAX_PORT:-15120}:${ROUTING_PORT:-15100}-${ROUTING_MAX_PORT:-15120}"
      - "${PORT_BIND_IP:-0.0.0.0}:${FIREWALL_PORT:-2021}:${FIREWALL_PORT:-2021}"
      - "127.0.0.1:${ADMIN_PORT:-8080}:${ADMIN_PORT:-8080}"
    volumes:
      - ./data:/data
    networks:
      - won-network

networks:
  won-network:
    driver: bridge
